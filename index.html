(function(){

    case'lantern': return o(`<rect x="80" y="64" width="40" height="56" rx="6" stroke="${O}"/><path d="M100 64 L100 50"/><circle cx="100" cy="92" r="13" fill="${O}" fill-opacity=".4" stroke="${Ob}"/><path d="M70 124 L130 124"/>${ring(100,92,64)}`);

    case'fire': return o(`<path d="M100 40 C120 78 138 92 138 122 A38 38 0 1 1 62 122 C62 96 78 84 100 40Z" fill="${O}" fill-opacity=".22" stroke="${O}"/><path d="M100 86 C110 104 118 112 118 126 A18 18 0 1 1 82 126 C82 114 90 106 100 86Z" fill="${Ob}" fill-opacity=".4" stroke="${Ob}"/>`);

function ring(cx,cy,r){return `<circle cx="${cx}" cy="${cy}" r="${r}" stroke-opacity=".3"/>`;}
function dot(x,y,c){return `<circle cx="${x}" cy="${y}" r="4" fill="${c}" stroke="${c}"/>`;}
function starburst(O,Ob){let s='';for(let k=0;k<16;k++){const a=k*Math.PI/8,r=k%2?72:40;const x=100+Math.cos(a)*r,y=100+Math.sin(a)*r;s+=(k?'L':'M')+x.toFixed(0)+' '+y.toFixed(0)+' ';}s+='Z';return `<path d="${s}" fill="${Ob}" fill-opacity=".12" stroke="${O}"/><circle cx="100" cy="100" r="10" fill="${Ob}" stroke="${Ob}"/>`;}

function constellation(arq,size){
  const O='#FF7F32',Ob='#FFB57D';
  const pad=14, sc=(size-pad*2)/100, P=(v)=>(pad+v*sc).toFixed(1);
  const lines=arq.links.map(([a,b])=>{const A=arq.stars[a],B=arq.stars[b];
    return `<line x1="${P(A[0])}" y1="${P(A[1])}" x2="${P(B[0])}" y2="${P(B[1])}" stroke="${O}" stroke-width="1" stroke-opacity=".55" class="cl"/>`;}).join('');
  const dots=arq.stars.map((s,k)=>{const r=[0,1.8,2.8,4][s[2]]||2.4;
    return `<g class="cs" style="animation-delay:${k*0.12}s"><circle cx="${P(s[0])}" cy="${P(s[1])}" r="${r+5}" fill="${Ob}" fill-opacity=".14"/><circle cx="${P(s[0])}" cy="${P(s[1])}" r="${r}" fill="${Ob}" stroke="${Ob}" stroke-width=".5"/></g>`;}).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" class="constel">
    <style>.constel .cl{stroke-dasharray:120;stroke-dashoffset:120;animation:draw 1s ease forwards}.constel .cs{opacity:0;animation:pop .5s ease forwards}@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{to{opacity:1}}</style>${lines}${dots}</svg>`;
}
function sealStars(size){
  const Ob='#FFB57D',O='#FF7F32',pad=14,sc=(size-pad*2)/100,P=v=>(pad+v*sc).toFixed(1);
  const pts=[[50,16],[28,38],[72,38],[20,68],[80,68],[50,54],[40,86],[62,84]];
  const lk=[[0,1],[0,2],[1,3],[2,4],[1,5],[2,5],[3,6],[4,7]];
  const ln=lk.map(([a,b])=>`<line x1="${P(pts[a][0])}" y1="${P(pts[a][1])}" x2="${P(pts[b][0])}" y2="${P(pts[b][1])}" stroke="${O}" stroke-width="1" stroke-opacity=".4"/>`).join('');
  const dt=pts.map((p,k)=>`<circle cx="${P(p[0])}" cy="${P(p[1])}" r="${k%3?2.4:3.6}" fill="${Ob}" stroke="${Ob}"/>`).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${ln}${dt}</svg>`;
}

function intro(){
  setProg(0);
  app.innerHTML=`<div class="scene">
    <div class="seal">${sealStars(150)}</div>
    <div class="intro-h">Cada familia nace<br>bajo una <em>constelación</em>.</div>
    <div class="whisper">¿ ya sabes cuál es la tuya ?</div>
    <div class="namebox">
      <label class="namelbl" for="pn">Antes de mirar al cielo, di tu nombre</label>
      <input id="pn" class="nameinput" type="text" inputmode="text" autocomplete="name"
             maxlength="60" placeholder="Tu nombre" value="${esc(playerName)}"
             oninput="onName(this.value)" onkeydown="if(event.key==='Enter')begin()">
      <div class="namehint">El oráculo grabará tu nombre junto a tu constelación.</div>
    </div>
    <button id="goBtn" class="btn" onclick="begin()" ${playerName.trim()?'':'disabled'}>Mirar al cielo</button>
  </div>`;
  const inp=document.getElementById('pn');
  if(inp){ inp.focus(); }
}
function onName(v){
  playerName=v;
  const b=document.getElementById('goBtn');
  if(b) b.disabled = !v.trim();
}
function begin(){
  if(!playerName.trim()) return;
  playerName=playerName.trim();
  render();
}

function render(){
  if(i>=SCENES.length) return result();
  setProg(i/SCENES.length);
  const s=SCENES[i];
  if(s.era && !s._shown){
    s._shown=true;
    app.innerHTML=`<div class="era">
      <div class="glyph">${vis(s.vision,96)}</div>
      <p>${s.era}</p>
      <small>el cielo observa en silencio</small>
    </div>`;
    setTimeout(()=>paintScene(s),3200);
    return;
  }
  paintScene(s);
}
function paintScene(s){
  app.innerHTML=`<div class="scene">
    <div class="qmark">Visión ${roman(i+1)} de ${roman(SCENES.length)}</div>
    <div class="stele">${s.q}</div>
    <div class="vision">${vis(s.vision,200)}</div>
    <div class="opts">
      ${s.opts.map((o,k)=>`<button class="opt" onclick="pick(${k})">${o.t}</button>`).join('')}
    </div>
  </div>`;
}
function pick(k){answers.push(SCENES[i].opts[k].v);i++;render();window.scrollTo({top:0,behavior:'smooth'});}
function roman(n){return['','I','II','III','IV','V','VI','VII','VIII'][n]||n;}

function result(){
  setProg(1);
  let x=0,y=0;answers.forEach(v=>{x+=v[0];y+=v[1]});
  const n=answers.length;x/=n;y/=n;
  const ranked=Object.entries(ARQ).map(([k,a])=>({k,a,d:Math.hypot(x-a.x,y-a.y)})).sort((p,q)=>p.d-q.d);
  const winE=ranked[0], win=winE.a, sec=ranked[1].a;
  const defn=Math.min(100,Math.round(Math.hypot(x,y)/Math.SQRT2*100));
  const map={SEMBRADORES:"Pequeños Socios",GUARDIANES:"Protegidos",EXPLORADORES:"Dinámicos",SOÑADORES:"Ilusionistas"};
  window.__research={nombre:playerName,publico:win.n,interno:map[win.n],coord:{x:+x.toFixed(3),y:+y.toFixed(3)},segundo:sec.n,definicion:defn,raw:answers};
  window.__winKey=winE.k;

  // Sincroniza con Google Sheets (no bloquea la UI)
  syncToSheet({
    nombre: playerName,
    arquetipo: win.n,
    arquetipo_interno: map[win.n],
    celeste: win.celeste,
    segundo: sec.n,
    definicion: defn,
    x: +x.toFixed(3),
    y: +y.toFixed(3),
    respuestas: JSON.stringify(answers)
  });

  const order=Object.keys(ARQ).filter(k=>k!==winE.k).concat(winE.k);
  const affRows=order.map(k=>{
    const other=ARQ[k], me=winE.k, txt=AFIN[me][k];
    const label=(k===me)?`Con otra familia ${win.celeste}`:`Con los ${other.n}`;
    return `<div class="afrow"><div class="afmini">${constellation(other,50)}</div><div class="aftxt"><span class="afname">${label}</span>${txt}</div></div>`;
  }).join('');

  app.innerHTML=`<div class="scene">
    <div class="verdict">El cielo ha hablado</div>
    <div class="crest">${constellation(win,168)}</div>
    <div class="greet">Para <b>${esc(playerName)}</b> y su familia</div>
    <div class="lineage">LOS ${win.n}</div>
    <div class="epithet">${win.epi}</div>
    <p class="scroll">${win.scroll}</p>
    <div class="gift">
      <div class="gline"><span class="glab">Su luz</span><p class="gtxt">${win.luz}</p></div>
      <div class="gline"><span class="glab">El cielo susurra</span><p class="gtxt">${win.susurro}</p></div>
    </div>
    <p class="kin">En tu cielo brilla también la luz de <b>los ${sec.n}</b>. Ninguna constelación brilla sola.</p>
    <div class="afhead">Cómo se acompañan en el cielo</div>
    <div class="aflist">${affRows}</div>
    <div class="actions">
      <button class="btn" onclick="restart()">Mirar de nuevo</button>
      <button class="btn ghost" onclick="share()">Proclamar tu constelación</button>
    </div>
    <div class="savenote">${SHEET_ENDPOINT?'✦ Tu constelación quedó grabada en el cielo.':''}</div>
  </div>`;
}

function syncToSheet(data){
  if(!SHEET_ENDPOINT) return;
  try{
    fetch(SHEET_ENDPOINT,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({...data, ts:new Date().toISOString()})
    }).catch(e=>console.warn('Oráculo · sync falló:',e));
  }catch(e){console.warn('Oráculo · sync falló:',e);}
}

function share(){
  const win=ARQ[window.__winKey];
  const b=document.querySelector('.btn.ghost');
  const orig=b?b.textContent:'';
  const txt=`El cielo lo confirma: mi familia nació bajo LOS ${win.n}. Descubre la constelación de la tuya:`;
  const url='https://foresightcix.github.io/eloraculo/';
  const done=(m)=>{ if(!b)return; b.disabled=false; b.textContent=m; setTimeout(()=>b.textContent=orig,2300); };
  const reset=()=>{ if(!b)return; b.disabled=false; b.textContent=orig; };
  if(b){ b.disabled=true; b.textContent='Creando imagen…'; }
  buildShareCard(win,playerName).then(async (blob)=>{
    const file=new File([blob],'mi-constelacion.png',{type:'image/png'});
    // 1) Compartir nativo con imagen (móvil)
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],text:txt,url}); done('¡Compartido! ✦'); return; }
      catch(e){ if(e && e.name==='AbortError'){ reset(); return; } }
    }
    // 2) Escritorio: descarga la imagen + copia el texto
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='mi-constelacion.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    try{ await navigator.clipboard.writeText(txt+' '+url); }catch(e){}
    done('Imagen lista ✦');
  }).catch(()=>{
    try{ navigator.clipboard.writeText(txt+' '+url); }catch(e){}
    done('Texto copiado ✦');
  });
}

function buildShareCard(win,name){
  return new Promise((resolve)=>{
    const W=1080,H=1350,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const x=cv.getContext('2d');
    const FS='"Segoe UI", system-ui, -apple-system, sans-serif';
    // Fondo
    const g=x.createRadialGradient(W/2,H*0.08,40,W/2,H*0.08,H*1.05);
    g.addColorStop(0,'#15205e');g.addColorStop(.42,'#0B1138');g.addColorStop(1,'#06081C');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    // Estrellas de fondo
    for(let k=0;k<170;k++){
      const sx=Math.random()*W,sy=Math.random()*H,r=Math.random()*1.6+.3;
      x.globalAlpha=.25+Math.random()*.55;
      x.fillStyle=Math.random()<.18?'#FF7F32':'#FFD9B8';
      x.beginPath();x.arc(sx,sy,r,0,7);x.fill();
    }
    x.globalAlpha=1;x.textAlign='center';
    // Marca
    x.fillStyle='#FF7F32';x.font='700 26px '+FS;
    x.fillText('E L   O R Á C U L O',W/2,118);
    // Constelación
    drawConstelCanvas(x,win,W/2,350,360);
    // Para X y su familia
    x.fillStyle='#A9A6D6';x.font='500 34px '+FS;
    x.fillText(`Para ${name} y su familia`,W/2,632);
    // LOS
    x.fillStyle='#F4F2FB';x.font='800 54px '+FS;
    x.fillText('LOS',W/2,712);
    // Nombre grande (auto-fit) con degradado
    let fs=152;const maxW=W-130;
    do{ fs-=4; x.font='900 '+fs+'px '+FS; }while(x.measureText(win.n).width>maxW && fs>60);
    const grad=x.createLinearGradient(140,0,W-140,0);
    grad.addColorStop(0,'#ffffff');grad.addColorStop(1,'#FF7F32');
    x.fillStyle=grad;
    const nameY=712+fs*0.92;
    x.fillText(win.n,W/2,nameY);
    // Epígrafe (italic, dim, máx 3 líneas)
    x.fillStyle='#C9C6E8';x.font='italic 500 36px '+FS;
    let yy=nameY+78;
    wrapText(x,win.epi,W-200).slice(0,3).forEach(l=>{ x.fillText(l,W/2,yy); yy+=50; });
    // CTA inferior
    x.fillStyle='#A9A6D6';x.font='500 30px '+FS;
    x.fillText('Descubre la constelación de tu familia',W/2,H-128);
    x.fillStyle='#FF7F32';x.font='700 32px '+FS;
    x.fillText('foresightcix.github.io/eloraculo',W/2,H-78);
    cv.toBlob(bl=>resolve(bl),'image/png');
  });
}

function drawConstelCanvas(x,win,cx,cy,box){
  const pad=box*0.1,sc=(box-2*pad)/100;
  const PX=v=>cx-box/2+pad+v*sc, PY=v=>cy-box/2+pad+v*sc;
  x.save();
  x.strokeStyle='rgba(255,127,50,.55)';x.lineWidth=2.5;
  win.links.forEach(([a,b])=>{const A=win.stars[a],B=win.stars[b];
    x.beginPath();x.moveTo(PX(A[0]),PY(A[1]));x.lineTo(PX(B[0]),PY(B[1]));x.stroke();});
  win.stars.forEach(s=>{const r=[0,4,6.5,9][s[2]]||5.5;
    x.beginPath();x.fillStyle='rgba(255,181,125,.18)';x.arc(PX(s[0]),PY(s[1]),r+9,0,7);x.fill();
    x.beginPath();x.fillStyle='#FFB57D';x.arc(PX(s[0]),PY(s[1]),r,0,7);x.fill();});
  x.restore();
}

function wrapText(x,text,maxW){
  const words=String(text).split(' ');const lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;
    if(x.measureText(t).width>maxW && line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines;
}
function restart(){i=0;answers=[];SCENES.forEach(s=>s._shown=false);intro();window.scrollTo({top:0,behavior:'smooth'});}

intro();
</script>
</body>
</html>
